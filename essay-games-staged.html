<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Games — INTUITY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;900&family=Instrument+Sans:wght@400;500&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0d; --ink:#e8e6e0; --dim:#8e8e93; --faint:#4a4a4a;
    --gold:#C9A961; --gold-d:#9a7d3f; --ok:#2ecc71;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:'Instrument Sans',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(16px + env(safe-area-inset-top)) 16px 20px;
  }
  .cond{font-family:'Barlow Condensed',sans-serif}
  main{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center}

  /* top bar */
  #top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  #top a{color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:.12em}
  #top .brand{color:var(--gold);font-size:12px;letter-spacing:.3em;font-weight:600}

  /* stage strip (from BUILD's nav-pips) */
  #strip{width:100%;display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
  .pip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;
    padding:.3rem .7rem;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:900;
    letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s;white-space:nowrap}
  .pip:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
  .pip.current{color:#fff}
  .pip.done{color:rgba(255,255,255,.55)}

  /* the stage card — BUILD's stage-card */
  .card{position:relative;width:min(500px,96vw);background:#fff;border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 0 0 1px rgba(255,255,255,.06),8px 14px 0 rgba(0,0,0,.45),0 32px 72px rgba(0,0,0,.65);
    animation:slide .4s cubic-bezier(.34,1.2,.64,1) both}
  @keyframes slide{from{opacity:0;transform:translateX(40px) scale(.96)}to{opacity:1;transform:none}}
  .header{position:relative;padding:1.4rem 1.6rem 1.3rem;overflow:hidden;background:var(--accent,#3d9e95);transition:background .35s}
  .ghost-num{position:absolute;right:-.6rem;bottom:-1.2rem;font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(6rem,22vw,9rem);font-weight:900;line-height:1;color:rgba(255,255,255,.18);
    letter-spacing:-.05em;pointer-events:none}
  .step-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:900;letter-spacing:.24em;
    text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:.4rem;display:block}
  .title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;
    letter-spacing:.03em;text-transform:uppercase;color:#fff;line-height:1}
  .game-badge{display:inline-block;margin-top:.6rem;height:19px;padding:0 .55rem;line-height:19px;border-radius:4px;
    background:rgba(255,255,255,.2);font-family:'Barlow Condensed',sans-serif;font-size:.55rem;font-weight:900;
    letter-spacing:.14em;text-transform:uppercase;color:#fff}

  .body{padding:1.1rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:.5rem;min-height:180px}

  /* ── ORDER THE SUPPORTS (inside the card) ── */
  .os-claim{background:rgba(0,0,0,.04);border-radius:10px;padding:12px 14px;border-left:3px solid var(--accent)}
  .os-claim .tag{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;letter-spacing:.2em;color:var(--gold-d);font-weight:900}
  .os-claim .text{font-family:'Crimson Text',serif;font-size:16px;line-height:1.45;color:#1a1a1a;margin-top:2px}
  .os-supports{display:flex;flex-direction:column;gap:8px}
  .os-item{background:#fff;border:1px solid #e2ddd0;border-radius:10px;padding:11px 14px 11px 38px;position:relative;
    cursor:grab;font-family:'Crimson Text',serif;font-size:15px;line-height:1.5;color:#1a1a1a;transition:.15s}
  .os-item::before{content:'\2261';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#c9c2b2;font-size:16px}
  .os-item.dragging{opacity:.4;border-color:var(--gold)}
  .os-item.picked{border-color:var(--gold);background:#fdfaf2}
  .os-item.locked{border-color:var(--ok)}
  .os-item.locked::before{content:'\2713';color:var(--ok)}
  .os-whole{font-family:'Crimson Text',serif;font-size:15px;line-height:1.7;color:#1a1a1a;padding:4px 2px}
  .os-whole .frame{color:var(--gold-d);font-weight:600}
  .os-win{color:var(--ok);font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;font-size:12px;font-weight:900;text-align:center;padding:6px}

  .stub{text-align:center;color:#b0a898;font-family:'Instrument Sans',sans-serif;font-size:14px;padding:2.4rem 1rem;line-height:1.6}
  .stub b{color:#6a6252}

  /* card action row */
  .actions{display:flex;gap:8px;justify-content:center;padding:.2rem 1.4rem 1.2rem}
  .actions button{font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;font-size:12px;border-radius:999px;
    padding:9px 18px;cursor:pointer;border:1px solid #e2ddd0;background:#fff;color:#4a463a}
  .actions .primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .actions .primary:disabled{opacity:.4;cursor:default}

  /* ── the game-picker footer (universal: 4 games at every stage) ── */
  #games{width:100%;max-width:500px;margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .gbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;
    padding:12px 6px;text-align:center;cursor:pointer;transition:.18s}
  .gbtn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25)}
  .gbtn.on{border-color:var(--gold);background:rgba(201,169,97,.12)}
  .gbtn .ico{font-size:20px;display:block;margin-bottom:5px}
  .gbtn .nm{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--dim);line-height:1.15}
  .gbtn.on .nm{color:var(--gold)}

  #fulltext{margin-top:12px;color:var(--dim);font-size:12px;letter-spacing:.08em;background:none;border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:8px 18px;cursor:pointer;font-family:'Barlow Condensed',sans-serif}
  #fulltext:hover{color:var(--gold);border-color:var(--gold-d)}

  #loading{color:var(--dim);padding:3rem;font-size:.9rem}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main>
  <div id="top">
    <a href="index.html" class="cond">&#8592; GAMES</a>
    <span class="brand cond">ESSAY GAMES</span>
    <span class="cond" id="typeTag" style="color:var(--dim);font-size:12px"></span>
  </div>

  <div id="strip"></div>
  <div id="loading">Loading&hellip;</div>
  <div id="shell" style="display:none;width:100%;display:flex;flex-direction:column;align-items:center">
    <div class="card" id="card">
      <div class="header" id="header">
        <div class="ghost-num" id="ghostNum">01</div>
        <span class="step-label" id="stepLabel">STAGE</span>
        <div class="title" id="stageTitle">INTRODUCTION</div>
        <span class="game-badge" id="gameBadge">ORDER THE SUPPORTS</span>
      </div>
      <div class="body" id="cardBody"></div>
      <div class="actions" id="cardActions"></div>
    </div>

    <div id="games"></div>
    <button id="fulltext" class="cond">&#9733; FULL TEXT MODE &middot; FOR THE ADVENTUROUS</button>
  </div>
</main>

<script>
(function(){
  'use strict';
  const params=new URLSearchParams(location.search);
  const type=params.get('type')||'essays';
  const DATA={essays:'data/essays-models.json',reports:'data/reports-models.json',
    reviews:'data/reviews-models.json',emails:'data/emails-models.json'};
  const ACCENTS=['#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f'];
  const FRAMES=['This is because','For example','As a result','Firstly','Secondly','Furthermore',
    'Moreover','In addition','However','On the other hand','For instance','Because of this',
    'Consequently','Therefore','To begin with','What is more','I firmly believe that','In my view',
    'In conclusion','To sum up','Nowadays','These days'];

  const GAMES=[
    {id:'order',    ico:'\uD83D\uDD00', nm:'Order Supports', live:true},
    {id:'sequence', ico:'\uD83D\uDCD1', nm:'Sequence',       url:'B2-ordering-game.html'},
    {id:'puzzle',   ico:'\uD83E\uDDE9', nm:'Puzzle',         url:'paragraph-puzzle.html'},
    {id:'builder',  ico:'\u270D\uFE0F', nm:'Builder',        url:'paragraph-builder-game.html'}
  ];

  let stages=[], si=0, game='order', solved=new Set();
  let order=[], curSupports=[], curClaim='';

  fetch(DATA[type]).then(r=>r.json()).then(d=>{
    const sample=(d.samples&&d.samples[0]);
    if(!sample){fail('No content.');return;}
    stages=sample.paragraphs.map((p,i)=>{
      const sents=p.text.trim().split(/(?<=[.!?])\s+/).filter(Boolean);
      return {label:shortLabel(p.label), full:p.label, sents};
    });
    document.getElementById('typeTag').textContent=type.toUpperCase();
    document.getElementById('loading').style.display='none';
    document.getElementById('shell').style.display='flex';
    renderStrip(); renderGames(); load(0);
  }).catch(()=>fail('Could not load game data.'));

  function fail(m){document.getElementById('loading').textContent=m;}
  function shortLabel(l){
    if(/introduction/i.test(l))return'Introduction';
    if(/conclusion/i.test(l))return'Conclusion';
    const m=l.match(/body paragraph\s*(\d)/i); if(m)return'Body '+m[1];
    return l.split('-')[0].trim();
  }

  function renderStrip(){
    const s=document.getElementById('strip'); s.innerHTML='';
    stages.forEach((st,i)=>{
      const b=document.createElement('button');
      b.className='pip cond'+(i===si?' current':'')+(solved.has(i+':'+game)?' done':'');
      b.textContent=st.label; b.onclick=()=>load(i);
      s.appendChild(b);
    });
  }
  function renderGames(){
    const g=document.getElementById('games'); g.innerHTML='';
    GAMES.forEach(gm=>{
      const b=document.createElement('div');
      b.className='gbtn'+(gm.id===game?' on':'');
      b.innerHTML=`<span class="ico">${gm.ico}</span><span class="nm cond">${gm.nm}</span>`;
      b.onclick=()=>{
        if(gm.url){ location.href=gm.url+'?type='+encodeURIComponent(type); return; }
        game=gm.id; renderGames(); load(si);
      };
      g.appendChild(b);
    });
  }

  function load(i){
    si=i;
    const st=stages[i];
    const accent=ACCENTS[i%ACCENTS.length];
    document.documentElement.style.setProperty('--accent',accent);
    const card=document.getElementById('card');
    card.style.setProperty('--accent',accent);
    document.getElementById('header').style.background=accent;
    document.getElementById('ghostNum').textContent=String(i+1).padStart(2,'0');
    document.getElementById('stepLabel').textContent='STAGE '+(i+1)+' OF '+stages.length;
    document.getElementById('stageTitle').textContent=st.label.toUpperCase();
    const gm=GAMES.find(g=>g.id===game);
    document.getElementById('gameBadge').textContent=gm.nm.toUpperCase();
    // re-trigger slide anim
    card.classList.remove('card'); void card.offsetWidth; card.classList.add('card');
    renderStrip();
    if(gm.live) renderOrder(st); else renderStub(gm);
  }

  // ── ORDER THE SUPPORTS in-card ──
  function renderOrder(st){
    curClaim=st.sents[0]||'';
    curSupports=st.sents.slice(1);
    const body=document.getElementById('cardBody');
    const actions=document.getElementById('cardActions');
    if(curSupports.length<2){
      body.innerHTML=`<div class="stub">This stage has <b>${st.sents.length}</b> sentence(s) \u2014 not enough to order.<br>Try a body paragraph, or another game.</div>`;
      actions.innerHTML=''; return;
    }
    order=shuffle(curSupports.map((_,k)=>k));
    if(order.every((v,k)=>v===k)) order.reverse();
    body.innerHTML=`<div class="os-claim"><span class="tag cond">CLAIM</span><div class="text">${curClaim}</div></div>
      <div class="os-supports" id="osSupports"></div>`;
    paintSupports();
    actions.innerHTML=`<button class="ghost" onclick="window._shuffle()">SHUFFLE</button>
      <button class="primary" id="osCheck" onclick="window._check()">CHECK THE FLOW</button>`;
  }
  function paintSupports(){
    const box=document.getElementById('osSupports'); box.innerHTML='';
    order.forEach(origIdx=>{
      const el=document.createElement('div');
      el.className='os-item'; el.draggable=true;
      el.textContent=curSupports[origIdx];
      wire(el); box.appendChild(el);
    });
  }
  let dragEl=null,pick=null;
  function wire(el){
    el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');commit();});
    el.addEventListener('dragover',e=>{e.preventDefault();
      const box=document.getElementById('osSupports');const after=afterEl(box,e.clientY);
      if(dragEl&&dragEl!==el){after==null?box.appendChild(dragEl):box.insertBefore(dragEl,after);}});
    el.addEventListener('click',()=>{
      if(el.classList.contains('locked'))return;
      if(!pick){pick=el;el.classList.add('picked');}
      else{if(pick!==el){const box=document.getElementById('osSupports');
        const pi=[...box.children].indexOf(pick),ei=[...box.children].indexOf(el);
        pi<ei?box.insertBefore(el,pick):box.insertBefore(pick,el);}
        pick.classList.remove('picked');pick=null;commit();}});
  }
  function afterEl(box,y){return[...box.querySelectorAll('.os-item:not(.dragging)')].reduce((c,ch)=>{
    const b=ch.getBoundingClientRect();const o=y-b.top-b.height/2;
    return(o<0&&o>c.offset)?{offset:o,element:ch}:c;},{offset:-Infinity,element:null}).element;}
  function commit(){order=[...document.querySelectorAll('#osSupports .os-item')]
    .map(el=>curSupports.indexOf(el.textContent));}
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

  window._shuffle=()=>load(si);
  window._check=()=>{
    commit();
    const els=[...document.querySelectorAll('#osSupports .os-item')];
    if(order.every((v,k)=>v===k)){
      els.forEach(el=>el.classList.add('locked'));
      solved.add(si+':order'); win();
    }else{
      els.forEach((el,k)=>el.classList.toggle('locked',order[k]===k));
      const n=order.filter((v,k)=>v===k).length;
      const btn=document.getElementById('osCheck');
      btn.textContent=n>0?n+' IN PLACE \u2014 KEEP GOING':'TRY AGAIN';
      setTimeout(()=>{if(btn)btn.textContent='CHECK THE FLOW';},1500);
    }
  };
  function win(){
    const whole=[curClaim,...curSupports].map(lightFrames).join(' ');
    document.getElementById('cardBody').innerHTML=
      `<div class="os-win">\u2713 THAT FLOWS</div><div class="os-whole">${whole}</div>`;
    document.getElementById('cardActions').innerHTML=
      `<button class="ghost" onclick="window._shuffle()">AGAIN</button>
       <button class="primary" onclick="window._next()">NEXT STAGE \u2192</button>`;
    renderStrip();
  }
  window._next=()=>load((si+1)%stages.length);
  function lightFrames(s){let o=s;FRAMES.forEach(f=>{
    const re=new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
    o=o.replace(re,m=>`<span class="frame">${m}</span>`);});return o;}

  function renderStub(gm){
    document.getElementById('cardBody').innerHTML=
      `<div class="stub"><b>${gm.nm}</b> for this stage<br>is coming soon.<br><br>Try <b>Order Supports</b> \u2014 it's live.</div>`;
    document.getElementById('cardActions').innerHTML='';
  }

  document.getElementById('fulltext').onclick=()=>{
    alert('Full-text mode (order the whole essay) \u2014 coming in the next build.');
  };
})();
</script>
</body>
</html>
