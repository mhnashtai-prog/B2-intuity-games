<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Essay Games — INTUITY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;900&family=Instrument+Sans:wght@400;500&family=Crimson+Text:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d0d; --ink:#e8e6e0; --dim:#8e8e93; --faint:#4a4a4a;
    --gold:#C9A961; --gold-d:#9a7d3f; --ok:#2ecc71;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:'Instrument Sans',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:calc(16px + env(safe-area-inset-top)) 16px 20px;
  }
  .cond{font-family:'Barlow Condensed',sans-serif}
  main{width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center}

  /* top bar */
  #top{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  #top a{color:var(--dim);text-decoration:none;font-size:12px;letter-spacing:.12em}
  #top .brand{color:var(--gold);font-size:12px;letter-spacing:.3em;font-weight:600}

  /* stage strip (from BUILD's nav-pips) */
  #strip{width:100%;display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center;margin-bottom:.8rem}
  .pip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;
    padding:.3rem .7rem;font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:900;
    letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.28);cursor:pointer;transition:.18s;white-space:nowrap}
  .pip:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
  .pip.current{color:#fff}
  .pip.done{color:rgba(255,255,255,.55)}

  /* the stage card — BUILD's stage-card */
  .card{position:relative;width:min(500px,96vw);background:#fff;border-radius:20px;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 0 0 1px rgba(255,255,255,.06),8px 14px 0 rgba(0,0,0,.45),0 32px 72px rgba(0,0,0,.65);
    animation:slide .4s cubic-bezier(.34,1.2,.64,1) both}
  @keyframes slide{from{opacity:0;transform:translateX(40px) scale(.96)}to{opacity:1;transform:none}}
  .header{position:relative;padding:1.4rem 1.6rem 1.3rem;overflow:hidden;background:var(--accent,#3d9e95);transition:background .35s}
  .ghost-num{position:absolute;right:-.6rem;bottom:-1.2rem;font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(6rem,22vw,9rem);font-weight:900;line-height:1;color:rgba(255,255,255,.18);
    letter-spacing:-.05em;pointer-events:none}
  .step-label{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:900;letter-spacing:.24em;
    text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:.4rem;display:block}
  .title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(1.8rem,6vw,2.6rem);font-weight:900;
    letter-spacing:.03em;text-transform:uppercase;color:#fff;line-height:1}
  .game-badge{display:inline-block;margin-top:.6rem;height:19px;padding:0 .55rem;line-height:19px;border-radius:4px;
    background:rgba(255,255,255,.2);font-family:'Barlow Condensed',sans-serif;font-size:.55rem;font-weight:900;
    letter-spacing:.14em;text-transform:uppercase;color:#fff}

  .body{padding:1.1rem 1.4rem 1.2rem;display:flex;flex-direction:column;gap:.5rem;min-height:180px}

  /* ── ORDER THE SUPPORTS (inside the card) ── */
  .os-claim{background:rgba(0,0,0,.04);border-radius:10px;padding:12px 14px;border-left:3px solid var(--accent)}
  .os-claim .tag{font-family:'Barlow Condensed',sans-serif;font-size:.55rem;letter-spacing:.2em;color:var(--gold-d);font-weight:900}
  .os-claim .text{font-family:'Crimson Text',serif;font-size:16px;line-height:1.45;color:#1a1a1a;margin-top:2px}
  .os-supports{display:flex;flex-direction:column;gap:8px}
  .os-item{background:#fff;border:1px solid #e2ddd0;border-radius:10px;padding:11px 14px 11px 38px;position:relative;
    cursor:grab;font-family:'Crimson Text',serif;font-size:15px;line-height:1.5;color:#1a1a1a;transition:.15s}
  .os-item::before{content:'\2261';position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#c9c2b2;font-size:16px}
  .os-item.dragging{opacity:.4;border-color:var(--gold)}
  .os-item.picked{border-color:var(--gold);background:#fdfaf2}
  .os-item.locked{border-color:var(--ok)}
  .os-item.locked::before{content:'\2713';color:var(--ok)}
  .os-whole{font-family:'Crimson Text',serif;font-size:15px;line-height:1.7;color:#1a1a1a;padding:4px 2px}
  .os-whole .frame{color:var(--gold-d);font-weight:600}
  .os-win{color:var(--ok);font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;font-size:12px;font-weight:900;text-align:center;padding:6px}

  .jump{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 0 .6rem}
  .jbtn{background:var(--accent);color:#fff;border:none;border-radius:999px;padding:9px 18px;
    font-size:12px;letter-spacing:.14em;font-weight:700;cursor:pointer}
  .jbtn:hover{filter:brightness(1.08)}
  .hint{color:#8a8272;font-size:12.5px;text-align:center;padding:2px 0 8px;line-height:1.45}
  .pz-line{min-height:52px;background:rgba(0,0,0,.04);border-radius:10px;padding:10px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start}
  .pz-empty{color:#bdb6a6}
  .pz-pool{display:flex;flex-wrap:wrap;gap:6px;padding-top:10px}
  .pz-w{background:#fff;border:1px solid #e2ddd0;border-radius:8px;padding:6px 11px;font-family:'Crimson Text',serif;font-size:15px;color:#1a1a1a;cursor:pointer;user-select:none}
  .pz-w:hover{border-color:var(--gold)}
  .pz-w.placed{background:#fdfaf2;border-color:var(--gold)}
  .pz-nudge{width:100%;color:#a2988a;font-size:12px;padding-top:6px;font-family:'Instrument Sans',sans-serif}
  .bd-sent{font-family:'Crimson Text',serif;font-size:16px;line-height:1.6;color:#1a1a1a;background:rgba(0,0,0,.03);border-radius:10px;padding:12px 14px}
  .bd-slot{color:var(--gold-d);font-weight:700;border-bottom:2px dotted var(--gold)}
  .bd-opts{display:flex;flex-direction:column;gap:7px;padding-top:10px}
  .bd-opt{background:#fff;border:1px solid #e2ddd0;border-radius:9px;padding:10px 13px;text-align:left;font-family:'Crimson Text',serif;font-size:15px;color:#1a1a1a;cursor:pointer}
  .bd-opt:hover{border-color:var(--gold)}
  .bd-opt.right{border-color:var(--ok);background:#f2fbf5}
  .bd-opt.other{border-color:#e2ddd0;opacity:.55}
  .bd-note{color:#a2988a;font-size:12px;padding-top:4px;line-height:1.45}
  .stub{text-align:center;color:#b0a898;font-family:'Instrument Sans',sans-serif;font-size:14px;padding:2.4rem 1rem;line-height:1.6}
  .stub b{color:#6a6252}

  /* card action row */
  .actions{display:flex;gap:8px;justify-content:center;padding:.2rem 1.4rem 1.2rem}
  .actions button{font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;font-size:12px;border-radius:999px;
    padding:9px 18px;cursor:pointer;border:1px solid #e2ddd0;background:#fff;color:#4a463a}
  .actions .primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700}
  .actions .primary:disabled{opacity:.4;cursor:default}

  /* ── the game-picker footer (universal: 4 games at every stage) ── */
  #games{width:100%;max-width:500px;margin-top:14px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .gbtn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:12px;
    padding:12px 6px;text-align:center;cursor:pointer;transition:.18s}
  .gbtn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25)}
  .gbtn.on{border-color:var(--gold);background:rgba(201,169,97,.12)}
  .gbtn .ico{font-size:20px;display:block;margin-bottom:5px}
  .gbtn .nm{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;color:var(--dim);line-height:1.15}
  .gbtn.on .nm{color:var(--gold)}

  #fulltext{margin-top:12px;color:var(--dim);font-size:12px;letter-spacing:.08em;background:none;border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:8px 18px;cursor:pointer;font-family:'Barlow Condensed',sans-serif}
  #fulltext:hover{color:var(--gold);border-color:var(--gold-d)}

  #loading{color:var(--dim);padding:3rem;font-size:.9rem}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

  /* ════════ WHITEBOARD — large screens, read from across the room ════════ */
  @media (min-width:1100px){
    main{max-width:900px}
    .card{width:min(860px,88vw);border-radius:26px}
    .header{padding:2rem 2.2rem 1.9rem}
    .title{font-size:clamp(2.6rem,3.6vw,3.6rem)}
    .step-label{font-size:.78rem;letter-spacing:.26em}
    .game-badge{font-size:.72rem;height:24px;line-height:24px;padding:0 .8rem}
    .ghost-num{font-size:clamp(9rem,13vw,13rem)}
    .body{padding:1.6rem 2.2rem 1.7rem;min-height:260px;gap:.75rem}
    .hint{font-size:16px;padding:4px 0 12px}
    .os-claim{padding:16px 20px}
    .os-claim .text{font-size:21px}
    .os-claim .tag{font-size:.7rem}
    .os-item{font-size:20px;line-height:1.55;padding:16px 20px 16px 52px}
    .os-item::before{font-size:22px;left:18px}
    .os-whole{font-size:20px;line-height:1.75}
    .os-win{font-size:15px}
    .pz-line{min-height:74px;padding:14px 16px;gap:9px}
    .pz-w{font-size:20px;padding:9px 15px}
    .bd-sent{font-size:21px;padding:16px 20px}
    .bd-opt{font-size:20px;padding:14px 18px}
    .bd-note,.pz-nudge{font-size:14px}
    .actions{padding:.4rem 2.2rem 1.6rem;gap:12px}
    .actions button{font-size:15px;padding:13px 26px}
    .pip{font-size:.74rem;padding:.42rem 1rem}
    #games{max-width:860px;gap:12px}
    .gbtn{padding:18px 8px}
    .gbtn .ico{font-size:28px}
    .gbtn .nm{font-size:.76rem}
    #fulltext{font-size:14px;padding:11px 24px}
    #top .brand{font-size:15px}
  }
  @media (min-width:1600px){
    main{max-width:1080px}
    .card{width:min(1040px,82vw)}
    .title{font-size:clamp(3.2rem,3.8vw,4.4rem)}
    .os-item,.bd-opt,.pz-w,.os-whole{font-size:23px}
    .os-claim .text,.bd-sent{font-size:24px}
    .body{min-height:320px}
  }

  /* ════════ PHONE — thumb-sized targets, nothing cramped ════════ */
  @media (max-width:560px){
    body{padding:calc(10px + env(safe-area-inset-top)) 10px 18px}
    main{max-width:100%}
    #top{margin-bottom:8px}
    #top a,#top .brand,#top #typeTag{font-size:11px}
    #strip{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;
      -webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
    #strip::-webkit-scrollbar{display:none}
    .pip{flex:none;padding:.45rem .8rem;font-size:.62rem}
    .card{width:100%;border-radius:16px;box-shadow:0 0 0 1px rgba(255,255,255,.06),4px 8px 0 rgba(0,0,0,.45),0 20px 44px rgba(0,0,0,.6)}
    .header{padding:1.05rem 1.15rem 1rem}
    .title{font-size:clamp(1.5rem,7.5vw,2.1rem)}
    .ghost-num{font-size:clamp(4.5rem,22vw,6.5rem);bottom:-.9rem}
    .body{padding:.9rem 1rem 1rem;min-height:200px}
    /* every tappable thing clears 48px */
    .os-item{font-size:15.5px;padding:14px 12px 14px 40px;min-height:52px;display:flex;align-items:center}
    .os-item::before{left:12px;font-size:17px}
    .pz-w{font-size:16px;padding:11px 14px;min-height:44px;display:inline-flex;align-items:center}
    .pz-line{min-height:60px;gap:7px}
    .bd-opt{font-size:15.5px;padding:13px 14px;min-height:50px}
    .bd-sent{font-size:15.5px;padding:12px 13px}
    .actions{padding:.2rem 1rem 1.1rem;gap:8px;flex-wrap:wrap}
    .actions button{padding:12px 18px;font-size:12.5px;min-height:46px;flex:1 1 auto}
    /* 2x2 footer beats 4 slivers on a phone */
    #games{grid-template-columns:repeat(2,1fr);gap:9px}
    .gbtn{padding:15px 8px;min-height:74px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .gbtn .ico{font-size:22px;margin-bottom:6px}
    .gbtn .nm{font-size:.66rem}
    #fulltext{width:100%;padding:13px 18px;min-height:48px}
    .os-whole{font-size:15.5px}
  }
  /* touch devices: the drag handle is misleading — show a tap affordance instead */
  body.touch .os-item::before{content:'\21C5'}
  body.touch .os-item.picked{box-shadow:0 0 0 2px var(--gold) inset}

  /* ════════ FIT THE VIEWPORT — card body scrolls, page never does ════════ */
  html,body{height:100%}
  body{overflow:hidden}
  main{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;width:100%}
  #shell{flex:1;min-height:0;width:100%;display:none;flex-direction:column;align-items:center}
  #shell.on{display:flex}
  .card{flex:1 1 auto;min-height:0;max-height:100%}
  .header{flex:none}
  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .body::-webkit-scrollbar{width:5px}
  .body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.14);border-radius:3px}
  .actions{flex:none}
  #games,#fulltext{flex:none}

  /* short screens (most laptops): compress the header, keep the game area */
  @media (max-height:840px){
    .header{padding:.95rem 1.5rem .9rem}
    .title{font-size:clamp(1.5rem,4vw,2.1rem)}
    .ghost-num{font-size:clamp(4.5rem,13vw,6.5rem);bottom:-.8rem}
    .step-label{font-size:.55rem;margin-bottom:.25rem}
    .game-badge{margin-top:.4rem;height:17px;line-height:17px}
    .body{padding:.85rem 1.4rem .9rem;min-height:0}
    .actions{padding:.15rem 1.4rem .8rem}
    #games{margin-top:9px}
    .gbtn{padding:9px 6px}
    .gbtn .ico{font-size:17px;margin-bottom:3px}
    .gbtn .nm{font-size:.58rem}
    #fulltext{margin-top:8px;padding:7px 16px;font-size:11px}
    #strip{margin-bottom:.5rem}
  }

  /* ════════ PUZZLE — the paragraph building up, sentence by sentence ════════ */
  .pz-built{font-family:'Crimson Text',serif;font-size:16px;line-height:1.7;color:#1a1a1a;
    background:rgba(0,0,0,.03);border-radius:10px;padding:11px 13px;margin-bottom:2px}
  .pz-built .frame{color:var(--gold-d);font-weight:600}
  .pz-built .pending{color:#c2bbab}
  .pz-dots{display:flex;gap:7px;justify-content:center;align-items:center;padding:8px 0 2px}
  .pz-dot{width:26px;height:26px;border-radius:50%;border:1px solid #ded8c8;background:#fff;
    font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:#9a9384;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .pz-dot:hover{border-color:var(--gold)}
  .pz-dot.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .pz-dot.done{border-color:var(--ok);color:var(--ok)}
  .pz-dot.done.on{background:var(--ok);border-color:var(--ok);color:#fff}
  .pz-solved-note{text-align:center;color:#8a8272;font-size:12.5px;padding:6px 0 2px}
  #modeToggle{display:inline-flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:2px;gap:2px}
  .mtb{background:none;border:none;border-radius:999px;padding:6px 13px;cursor:pointer;
    font-size:10.5px;letter-spacing:.14em;font-weight:700;color:var(--dim);white-space:nowrap}
  .mtb:hover{color:var(--ink)}
  .mtb.on{background:var(--gold);color:#2c2416}
  @media (min-width:1100px){ .mtb{font-size:12.5px;padding:8px 18px} }
  @media (max-width:560px){ .mtb{font-size:9.5px;padding:6px 10px;letter-spacing:.1em} }

  /* ── paragraph that starts incomplete and fills as sentences are confirmed ── */
  .ps-done{cursor:pointer;border-bottom:1px solid transparent;transition:.15s}
  .ps-done:hover{border-bottom-color:var(--gold);background:rgba(201,169,97,.1);border-radius:3px}
  .ps-now{color:#6a6252;background:rgba(201,169,97,.13);border-radius:4px;padding:0 3px}
  .ps-todo{color:#d4cec0;letter-spacing:.18em;font-size:.9em}

  /* ── tighter vertical rhythm: fit one screen ── */
  .body{gap:.38rem}
  .pz-built{line-height:1.5;padding:9px 12px;margin-bottom:0;font-size:15.5px}
  .hint{padding:1px 0 5px;line-height:1.35}
  .pz-line{min-height:44px;padding:8px 10px;gap:5px}
  .pz-pool{padding-top:7px;gap:5px}
  .pz-w{padding:5px 10px}
  .pz-dots{padding:6px 0 0;gap:6px}
  .pz-dot{width:24px;height:24px;font-size:11.5px}
  .os-item{padding:10px 13px 10px 36px;line-height:1.4}
  .os-item::before{left:12px}
  .os-claim{padding:10px 13px}
  .os-claim .text{line-height:1.4}
  .os-whole{line-height:1.6;padding:2px}
  .bd-opts{gap:6px;padding-top:8px}
  .bd-opt{padding:9px 12px}
  .bd-sent{padding:10px 12px;line-height:1.5}
  .actions{padding:.15rem 1.4rem .9rem}
  .actions button:disabled{opacity:.35;cursor:default}
  @media (min-width:1100px){
    .pz-built{font-size:19px;line-height:1.55;padding:12px 16px}
    .os-item{padding:12px 16px 12px 46px}
  }
  #newText{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:999px;
    color:var(--dim);font-size:10px;letter-spacing:.12em;font-weight:700;padding:6px 11px;cursor:pointer;margin-right:6px}
  #newText:hover{color:var(--gold);border-color:var(--gold-d)}
  #top{gap:8px}
  @media (min-width:1100px){ #newText{font-size:12px;padding:8px 14px} }
  @media (max-width:560px){ #newText{font-size:9px;padding:5px 8px} }
  /* ── STORYBOARD: flash card + blanks ── */
  .sb-flash{font-family:'Crimson Text',serif;font-size:17px;line-height:1.6;color:#1a1a1a;
    background:rgba(201,169,97,.1);border:1px solid rgba(201,169,97,.35);border-radius:10px;
    padding:14px 16px;text-align:center}
  .sb-flash .frame{color:var(--gold-d);font-weight:600}
  .sb-count{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;
    color:var(--gold-d);margin-top:8px;line-height:1}
  .sb-blanks{font-family:'Crimson Text',serif;font-size:17px;line-height:2;color:#1a1a1a;
    background:rgba(0,0,0,.03);border-radius:10px;padding:12px 14px;min-height:64px}
  .sb-w{display:inline-block;margin:0 2px}
  .sb-w.got{color:#1a1a1a}
  .sb-w.gap{color:transparent;border-bottom:2px solid rgba(201,169,97,.55);cursor:pointer;
    letter-spacing:.06em;user-select:none}
  .sb-w.gap:hover{border-bottom-color:var(--gold);background:rgba(201,169,97,.12)}
  .sb-in{display:flex;gap:7px;padding-top:9px}
  .sb-in input{flex:1;min-width:0;padding:10px 13px;border:1px solid #e2ddd0;border-radius:9px;
    font-family:'Instrument Sans',sans-serif;font-size:15px;color:#1a1a1a;background:#fff;min-height:44px}
  .sb-in input:focus{outline:none;border-color:var(--gold)}
  .sb-in input.miss{border-color:#d9a5a5;background:#fdf5f5}
  .sb-in button{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:9px;
    padding:0 16px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.12em;font-size:12px;
    font-weight:700;cursor:pointer;min-height:44px}
  @media (min-width:1100px){ .sb-flash,.sb-blanks{font-size:21px} .sb-count{font-size:38px} }
  /* words transferring into their position in the box */
  .ps-place{background:rgba(201,169,97,.16);border-bottom:1px solid rgba(201,169,97,.5);
    border-radius:3px;padding:0 3px;cursor:pointer}
  .ps-place:hover{background:rgba(201,169,97,.3)}
  .ps-gap{color:#cfc8b8;letter-spacing:.08em}
  .pz-built{min-height:56px}
  .sb-blank{display:inline-block;border:none;border-bottom:2px solid rgba(201,169,97,.55);
    background:rgba(201,169,97,.07);border-radius:3px 3px 0 0;padding:1px 4px;margin:0 1px;
    font-family:'Crimson Text',serif;font-size:inherit;color:#1a1a1a;text-align:center}
  .sb-blank:focus{outline:none;border-bottom-color:var(--gold);background:rgba(201,169,97,.18)}
  .sb-flashing{background:rgba(201,169,97,.12);border-radius:4px;padding:1px 4px}
  .sb-count{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;
    color:var(--gold-d);text-align:center;line-height:1;padding-top:6px}
  .sb-blank.wrong{color:#c0392b;border-bottom-color:#c0392b;background:rgba(192,57,43,.08);font-weight:600}
  .sb-given{color:#8a8272;background:rgba(0,0,0,.05);border-bottom:2px solid #cfc8b8;
    border-radius:3px 3px 0 0;padding:0 3px;font-style:italic}
  .sb-tally{display:block;color:#9a7d3f;font-size:11.5px;letter-spacing:.06em;padding-top:3px;
    font-family:'Barlow Condensed',sans-serif;font-weight:700}
  .pz-dot.part{border-color:var(--gold);color:var(--gold-d)}
  #toast{position:fixed;left:50%;bottom:22px;transform:translate(-50%,14px);z-index:200;
    background:rgba(28,28,30,.97);border:1px solid rgba(201,169,97,.45);color:#e8e6e0;
    border-radius:999px;padding:9px 18px;font-size:13px;letter-spacing:.02em;
    box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:.25s}
  #toast.on{opacity:1;transform:translate(-50%,0)}
  .prize{text-align:center;padding:6px 0 2px}
  .prize-badge{font-family:'Barlow Condensed',sans-serif;font-size:46px;font-weight:900;
    color:var(--accent);line-height:1}
  .prize-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;
    letter-spacing:.24em;color:#1a1a1a;margin-top:2px}
  .prize-sub{color:#8a8272;font-size:13px;margin-top:5px}
  .card{position:relative;overflow:hidden}
  .spark{position:absolute;top:38%;width:7px;height:7px;border-radius:2px;background:var(--accent);
    animation:fly 1.3s ease-out forwards;pointer-events:none}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) rotate(0)}
    100%{opacity:0;transform:translate(var(--dx),-150px) rotate(220deg)}}
  @media(prefers-reduced-motion:reduce){.spark{display:none}}
  .bd-para{line-height:1.75}
  .bd-plain{color:#5a5348}
  .bd-slot{display:inline-block;color:#cfc8b8;border-bottom:2px solid rgba(201,169,97,.4);
    letter-spacing:.08em;padding:0 3px}
  .bd-slot.active{border-bottom-color:var(--accent);background:rgba(201,169,97,.16);color:var(--gold-d)}
  .bd-tag{font-family:'Barlow Condensed',sans-serif;font-size:9.5px;font-weight:900;letter-spacing:.14em;
    color:#fff;background:var(--accent);border-radius:3px;padding:1px 5px;margin:0 4px 0 2px;vertical-align:2px}
</style>
</head>
<body>
<main>
  <div id="top">
    <a href="index.html" class="cond">&#8592; TASK TYPES</a>
    <span class="brand cond" id="brandTag">GAMES</span>
    <button id="newText" class="cond" onclick="window._newText()" title="Another model text">&#8635; <span id="textTag">NEW TEXT</span></button>
    <div id="modeToggle">
      <button class="mtb cond on" id="mbStages" onclick="window._mode(false)">STAGES</button>
      <button class="mtb cond" id="mbFull" onclick="window._mode(true)">FULL TEXT</button>
    </div>
  </div>

  <div id="strip"></div>
  <div id="loading">Loading&hellip;</div>
  <div id="shell">
    <div class="card" id="card">
      <div class="header" id="header">
        <div class="ghost-num" id="ghostNum">01</div>
        <span class="step-label" id="stepLabel">STAGE</span>
        <div class="title" id="stageTitle">INTRODUCTION</div>
        <span class="game-badge" id="gameBadge">ORDER THE SUPPORTS</span>
      </div>
      <div class="body" id="cardBody"></div>
      <div class="actions" id="cardActions"></div>
    </div>

    <div id="games"></div>
  </div>
</main>

<script>
(function(){
  'use strict';
  const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
  if(TOUCH) document.body.classList.add('touch');
  const MOVE_HINT = TOUCH ? 'Tap one sentence, then another, to swap them.'
                          : 'Drag the sentences into the order that reads best.';
  const params=new URLSearchParams(location.search);
  const type=params.get('type')||'essays';
  const DATA={essays:'data/essays-models.json',reports:'data/reports-models.json',
    reviews:'data/reviews-models.json',emails:'data/emails-models.json'};
  const ACCENTS=['#3d9e95','#e8723a','#7b5ea7','#c94f6d','#c08b2f'];
  const FRAMES=['This is because','For example','As a result','Firstly','Secondly','Furthermore',
    'Moreover','In addition','However','On the other hand','For instance','Because of this',
    'Consequently','Therefore','To begin with','What is more','I firmly believe that','In my view',
    'In conclusion','To sum up','Nowadays','These days'];

  const GAMES=[
    {id:'sequence',ico:'\uD83D\uDCD1', nm:'Sequence'},
    {id:'story',   ico:'\uD83C\uDFAF', nm:'Storyboard'},
    {id:'puzzle',  ico:'\uD83E\uDDE9', nm:'Puzzle'},
    {id:'builder', ico:'\u270D\uFE0F', nm:'Builder'}
  ];

  let stages=[], play=[], fullText=false, si=0, game='sequence', solved=new Set();
  function buildStages(){
    const sample=DATASET.samples[sampleIdx];
    stages=sample.paragraphs.map(p=>({
      label:shortLabel(p.label), full:p.label,
      sents:p.text.trim().split(/(?<=[.!?])\s+/).filter(Boolean)
    }));
  }
  window._newText=function(){
    if(!DATASET||DATASET.samples.length<2) return;
    let n=sampleIdx; while(n===sampleIdx) n=Math.floor(Math.random()*DATASET.samples.length);
    sampleIdx=n; solved=new Set(); pzStage=-1; si=0;
    buildStages(); rebuildPlay(); renderStrip(); load(firstPlayable());
    const t=document.getElementById('textTag');
    if(t) t.textContent='TEXT '+(sampleIdx+1)+'/'+DATASET.samples.length;
  };
  function rebuildPlay(){
    play = fullText
      ? [{label:'Full Text', sents: stages.reduce((a,s)=>a.concat(s.sents),[])}]
      : stages;
  }
  let order=[], curSupports=[], curClaim='';

  let DATASET=null, sampleIdx=0;
  fetch(DATA[type]).then(r=>r.json()).then(d=>{
    DATASET=d;
    if(!(d.samples&&d.samples.length)){fail('No content.');return;}
    sampleIdx=Math.floor(Math.random()*d.samples.length);
    buildStages();
    const TYPE_LABEL={essays:'ESSAY',reports:'REPORT',reviews:'REVIEW',emails:'EMAIL',articles:'ARTICLE'};
    document.getElementById('brandTag').textContent=(TYPE_LABEL[type]||'WRITING')+' GAMES';
    document.getElementById('textTag').textContent='TEXT '+(sampleIdx+1)+'/'+d.samples.length;
    document.getElementById('loading').style.display='none';
    document.getElementById('shell').classList.add('on');
    rebuildPlay(); renderStrip(); renderGames(); load(firstPlayable());
  }).catch(()=>fail('Could not load game data.'));

  function fail(m){document.getElementById('loading').textContent=m;}
  function playable(i){ if(!play[i])return false;
    const n=play[i].sents.length;
    return n>=1; }
  function firstPlayable(){ for(let i=0;i<play.length;i++) if(playable(i)) return i; return 0; }
  function shortLabel(l){
    if(/introduction/i.test(l))return'Introduction';
    if(/conclusion/i.test(l))return'Conclusion';
    const b=l.match(/body paragraph\s*(\d)/i); if(b)return'Body '+b[1];
    const p=l.match(/^(.+?)\s*-\s*paragraph\s*(\d)/i); if(p)return p[1].trim()+' '+p[2];
    return l.split('-')[0].trim();
  }

  function renderStrip(){
    const s=document.getElementById('strip'); s.innerHTML='';
    s.style.display = fullText ? 'none' : 'flex';
    play.forEach((st,i)=>{
      const b=document.createElement('button');
      b.className='pip cond'+(i===si?' current':'')+(solved.has(i+':'+game)?' done':'');
      b.textContent=st.label; b.onclick=()=>load(i);
      s.appendChild(b);
    });
  }
  function renderGames(){
    const g=document.getElementById('games'); g.innerHTML='';
    GAMES.forEach(gm=>{
      const b=document.createElement('div');
      b.className='gbtn'+(gm.id===game?' on':'');
      b.innerHTML=`<span class="ico">${gm.ico}</span><span class="nm cond">${gm.nm}</span>`;
      b.onclick=()=>{game=gm.id; renderGames(); load(si);};
      g.appendChild(b);
    });
  }

  function load(i){
    si=i;
    const st=play[i];
    const accent=ACCENTS[i%ACCENTS.length];
    document.documentElement.style.setProperty('--accent',accent);
    const card=document.getElementById('card');
    card.style.setProperty('--accent',accent);
    document.getElementById('header').style.background=accent;
    document.getElementById('ghostNum').textContent=String(i+1).padStart(2,'0');
    document.getElementById('stepLabel').textContent=(fullText?'WHOLE ESSAY':'STAGE '+(i+1)+' OF '+play.length);
    document.getElementById('stageTitle').textContent=st.label.toUpperCase();
    const gm=GAMES.find(g=>g.id===game);
    document.getElementById('gameBadge').textContent=gm.nm.toUpperCase();
    // re-trigger slide anim
    card.classList.remove('card'); void card.offsetWidth; card.classList.add('card');
    renderStrip();
    if(game==='sequence')      renderSequence(st);
    else if(game==='story')    renderStoryboard(st);
    else if(game==='puzzle')   renderPuzzle(st);
    else                       renderBuilder(st);
  }

  // ── ORDER THE SUPPORTS in-card ──
  function renderOrder(st){
    curClaim=st.sents[0]||'';
    curSupports=st.sents.slice(1);
    const body=document.getElementById('cardBody');
    const actions=document.getElementById('cardActions');
    if(fullText){
      body.innerHTML='<div class="stub"><b>Order Supports</b> works on one paragraph at a time \u2014 a claim with its support.<br><br>For the whole essay, try <b>Sequence</b> or <b>Puzzle</b>.</div>';
      actions.innerHTML=''; return;
    }
    if(curSupports.length<2){
      const opts=play.map((x,i)=>({x,i})).filter(o=>playable(o.i));
      body.innerHTML=`<div class="stub"><b>${st.label}</b> has only ${st.sents.length} sentence${st.sents.length===1?'':'s'} \u2014 too few to re-order.<br><br>Order the flow in a longer section:</div>
        <div class="jump" id="jumpRow">${opts.map(o=>`<button class="jbtn cond" onclick="window._go(${o.i})">${o.x.label.toUpperCase()}</button>`).join('')}</div>`;
      actions.innerHTML='';
      return;
    }
    order=shuffle(curSupports.map((_,k)=>k));
    if(order.every((v,k)=>v===k)) order.reverse();
    body.innerHTML=`<div class="hint">${MOVE_HINT}</div>
      <div class="os-claim"><span class="tag cond">CLAIM</span><div class="text">${curClaim}</div></div>
      <div class="os-supports" id="osSupports"></div>`;
    paintSupports();
    actions.innerHTML=`<button class="ghost" onclick="window._shuffle()">SHUFFLE</button>
      <button class="primary" id="osCheck" onclick="window._check()">CONFIRM THE ORDER</button>`;
  }
  function paintSupports(){
    const box=document.getElementById('osSupports'); box.innerHTML='';
    order.forEach(origIdx=>{
      const el=document.createElement('div');
      el.className='os-item'; el.draggable=!TOUCH;
      el.textContent=curSupports[origIdx];
      wire(el); box.appendChild(el);
    });
  }
  let dragEl=null,pick=null;
  function wire(el){
    el.addEventListener('dragstart',()=>{dragEl=el;el.classList.add('dragging');});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');commit();});
    el.addEventListener('dragover',e=>{e.preventDefault();
      const box=document.getElementById('osSupports');const after=afterEl(box,e.clientY);
      if(dragEl&&dragEl!==el){after==null?box.appendChild(dragEl):box.insertBefore(dragEl,after);}});
    el.addEventListener('click',()=>{
      if(el.classList.contains('locked'))return;
      if(!pick){pick=el;el.classList.add('picked');}
      else{if(pick!==el){const box=document.getElementById('osSupports');
        const pi=[...box.children].indexOf(pick),ei=[...box.children].indexOf(el);
        pi<ei?box.insertBefore(el,pick):box.insertBefore(pick,el);}
        pick.classList.remove('picked');pick=null;commit();}});
  }
  function afterEl(box,y){return[...box.querySelectorAll('.os-item:not(.dragging)')].reduce((c,ch)=>{
    const b=ch.getBoundingClientRect();const o=y-b.top-b.height/2;
    return(o<0&&o>c.offset)?{offset:o,element:ch}:c;},{offset:-Infinity,element:null}).element;}
  function commit(){order=[...document.querySelectorAll('#osSupports .os-item')]
    .map(el=>curSupports.indexOf(el.textContent));}
  function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

  window._shuffle=()=>load(si);
  window._check=()=>{
    commit();
    const els=[...document.querySelectorAll('#osSupports .os-item')];
    if(order.every((v,k)=>v===k)){
      els.forEach(el=>el.classList.add('locked'));
      solved.add(si+':order'); win();
    }else{
      els.forEach((el,k)=>el.classList.toggle('locked',order[k]===k));
      const n=order.filter((v,k)=>v===k).length;
      const btn=document.getElementById('osCheck');
      btn.textContent=n>0?n+' IN PLACE \u2014 KEEP GOING':'TRY AGAIN';
      setTimeout(()=>{if(btn)btn.textContent='CONFIRM THE ORDER';},1500);
    }
  };
  function win(){
    const whole=[curClaim,...curSupports].map(lightFrames).join(' ');
    document.getElementById('cardBody').innerHTML=
      `<div class="os-win">\u2713 THAT FLOWS</div><div class="os-whole">${whole}</div>`;
    document.getElementById('cardActions').innerHTML=
      `<button class="ghost" onclick="window._shuffle()">AGAIN</button>
       <button class="primary" onclick="window._next()">NEXT STAGE \u2192</button>`;
    renderStrip();
  }
  window._next=()=>load((si+1)%play.length);
  window._go=(i)=>load(i);
  function lightFrames(s){let o=s;FRAMES.forEach(f=>{
    const re=new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
    o=o.replace(re,m=>`<span class="frame">${m}</span>`);});return o;}


  /* ═══ SEQUENCE — drag every sentence into order (works at any stage, incl. the 2-sentence intro) ═══ */
  let seqOrder=[], seqSents=[];
  function renderSequence(st){
    seqSents=st.sents.slice();
    const body=document.getElementById('cardBody'), actions=document.getElementById('cardActions');
    if(seqSents.length<2){
      body.innerHTML='<div class="stub">This stage is a single sentence — nothing to sequence.</div>';
      actions.innerHTML=''; return;
    }
    seqOrder=shuffle(seqSents.map((_,k)=>k));
    if(seqOrder.every((v,k)=>v===k)) seqOrder.reverse();
    body.innerHTML='<div class="hint">'+MOVE_HINT+'</div><div class="os-supports" id="seqBox"></div>';
    const box=document.getElementById('seqBox');
    seqOrder.forEach(i=>{
      const el=document.createElement('div'); el.className='os-item'; el.draggable=!TOUCH;
      el.textContent=seqSents[i];
      wireDrag(el,'seqBox',()=>{ seqOrder=readOrder('seqBox',seqSents); });
      box.appendChild(el);
    });
    actions.innerHTML='<button onclick="window._reload()">SHUFFLE</button><button class="primary" id="seqCheck" onclick="window._seqCheck()">CONFIRM THE ORDER</button>';
  }
  window._seqCheck=function(){
    seqOrder=readOrder('seqBox',seqSents);
    const els=[].slice.call(document.querySelectorAll('#seqBox .os-item'));
    if(seqOrder.every((v,k)=>v===k)){
      els.forEach(el=>el.classList.add('locked'));
      solved.add(si+':sequence');
      showWhole(seqSents,'\u2713 THAT READS WELL');
    } else gentle(els,seqOrder,'seqCheck','CONFIRM THE ORDER');
  };

  /* ═══ STORYBOARD — dictation, one sentence at a time, nothing ever lost ═══
     Every sentence keeps its own progress, so moving between them never
     erases work. The paragraph is incremental: what you have done stays
     on screen as context for what comes next.                          ═══ */
  let sbStage=-1, sbSents=[], sbIdx=0, sbDone=new Set(), sbS={}, sbShowing=false, sbTimer=null;
  const SB_MAX_TRIES=3, SB_MAX_READS=3;
  function sbWords(i){ return (sbSents[i]||'').split(/\s+/).filter(Boolean); }
  function sbKey(w){ return (w||'').toLowerCase().replace(/[^a-z0-9']/g,''); }
  function sbGet(i){
    if(!sbS[i]) sbS[i]={found:new Set(), given:new Set(), typed:{}, tries:0, reads:0};
    return sbS[i];
  }
  function renderStoryboard(st){
    if(sbStage!==si){ sbStage=si; sbSents=st.sents.slice(); sbIdx=0; sbDone=new Set(); sbS={}; sbOpen(0); }
    paintStory();
  }
  function sbOpen(i){
    sbIdx=i; sbShowing=false;
    if(sbTimer){clearInterval(sbTimer);sbTimer=null;}
    const S=sbGet(i);
    if(sbDone.has(i)) sbWords(i).forEach((_,k)=>S.found.add(k));
  }
  function sbSettled(i){ const S=sbGet(i); return S.found.size+S.given.size===sbWords(i).length; }
  /* a sentence in progress, shown as context: known words, gaps collapsed to one … */
  function sbPartial(i){
    const words=sbWords(i), S=sbGet(i), out=[]; let gap=false;
    words.forEach((w,k)=>{
      if(S.found.has(k)||S.given.has(k)){ out.push('<span class="ps-place">'+w+'</span>'); gap=false; }
      else if(!gap){ out.push('<span class="ps-todo">…</span>'); gap=true; }
    });
    return out.join(' ');
  }
  function paintStory(){
    const body=document.getElementById('cardBody'), actions=document.getElementById('cardActions');
    const S=sbGet(sbIdx), words=sbWords(sbIdx), saved=sbDone.has(sbIdx);
    const complete=sbDone.size===sbSents.length;
    const out=S.tries>=SB_MAX_TRIES;

    const box=sbSents.map((s,i)=>{
      if(sbDone.has(i))
        return '<span class="ps-done" data-edit="'+i+'" title="Tap to do it again">'+lightFrames(s)+'</span>';
      if(i===sbIdx){
        if(sbShowing) return '<span class="sb-flashing">'+lightFrames(s)+'</span>';
        return sbWords(i).map((w,k)=>{
          if(S.found.has(k)) return '<span class="ps-place">'+w+'</span>';
          if(S.given.has(k)) return '<span class="sb-given" title="shown after three attempts">'+w+'</span>';
          const val=(S.typed[k]||'').replace(/"/g,'&quot;');
          return '<input class="sb-blank" data-k="'+k+'" value="'+val+'" '+
                 'style="width:'+Math.max(2.6,Math.min(sbKey(w).length*0.62,9))+'em" '+
                 'autocomplete="off" spellcheck="false">';
        }).join(' ');
      }
      const P=sbS[i];
      if(sbShowing) return '';
      return (P && (P.found.size||P.given.size)) ? sbPartial(i) : '<span class="ps-todo">…</span>';
    }).filter(Boolean).join(' ');

    const tally=(!saved && S.reads>0)
      ? '<span class="sb-tally">'+S.found.size+' / '+words.length+' correct'+
        (S.tries?' · attempt '+Math.min(S.tries+1,SB_MAX_TRIES)+' of '+SB_MAX_TRIES:'')+'</span>' : '';

    body.innerHTML =
      '<div class="pz-built">'+box+(sbShowing?'<div class="sb-count" id="sbCount"></div>':'')+'</div>' +
      '<div class="hint">'+(complete ? 'The paragraph is complete. Tap any sentence to do it again.'
        : sbShowing ? 'Read it — it disappears in a moment.'
        : saved ? 'Sentence '+(sbIdx+1)+' is saved. Tap a dot for the next one.'
        : S.reads===0 ? 'Sentence '+(sbIdx+1)+' of '+sbSents.length+' — tap SHOW ME, then fill every blank.'
        : out ? 'Three attempts used — the missing words are shown.'
        : 'Type a word in each blank, then check. Red means try again.')+tally+'</div>' +
      '<div class="pz-dots" id="pzDots"></div>';

    [].slice.call(body.querySelectorAll('.ps-done')).forEach(el=>{
      el.onclick=()=>{ const i=+el.getAttribute('data-edit'); sbDone.delete(i); sbS[i]=null; sbOpen(i); paintStory(); };
    });
    [].slice.call(body.querySelectorAll('.sb-blank')).forEach(inp=>{
      const k=+inp.getAttribute('data-k');
      if(S.wrongSet && S.wrongSet.has(k)) inp.classList.add('wrong');
      inp.oninput=()=>{ S.typed[k]=inp.value; inp.classList.remove('wrong'); };
      inp.onkeydown=(e)=>{
        if(e.key==='Enter'){ e.preventDefault();
          const all=[].slice.call(document.querySelectorAll('.sb-blank'));
          const j=all.indexOf(inp); if(j>-1&&all[j+1]) all[j+1].focus(); else window._sbCheck(); }
      };
    });
    const first=body.querySelector('.sb-blank'); if(first&&!sbShowing&&S.reads>0) first.focus();

    const dots=document.getElementById('pzDots');
    sbSents.forEach((_,i)=>{
      const d=document.createElement('button');
      const P=sbS[i], part=P&&(P.found.size||P.given.size)&&!sbDone.has(i);
      d.className='pz-dot'+(i===sbIdx?' on':'')+(sbDone.has(i)?' done':(part?' part':''));
      d.textContent=String(i+1);
      d.onclick=()=>{ sbOpen(i); paintStory(); };
      dots.appendChild(d);
    });

    const nextUndone=sbSents.findIndex((_,i)=>!sbDone.has(i) && i!==sbIdx);
    actions.innerHTML = sbShowing ? ''
      : (saved
          ? '<button onclick="window._sbAgain()">DO IT AGAIN</button>'+
            (nextUndone>-1?'<button class="primary" onclick="window._sbGo('+nextUndone+')">NEXT SENTENCE →</button>':'')
          : (S.reads<SB_MAX_READS
              ? '<button onclick="window._sbRead()">'+(S.reads?'SHOW ME AGAIN ('+(SB_MAX_READS-S.reads)+' left)':'SHOW ME')+'</button>'
              : '<button disabled>NO READS LEFT</button>')+
            (S.reads&&!sbSettled(sbIdx)&&!out ? '<button class="primary" onclick="window._sbCheck()">CHECK</button>' : '')+
            (sbSettled(sbIdx)||out ? '<button class="primary" onclick="window._sbConfirm()">CONFIRM SENTENCE</button>' : ''))
      + (complete ? '<button class="primary" onclick="window._sbFinish()">SEE IT WHOLE →</button>' : '');
  }
  const SB_CHEER=['Good recall.','Nice one.','That is coming back to you.','Steady.','Well remembered.'];
  const SB_NUDGE=['Close — look again.','Nearly. One more go.','Almost there.'];
  window._sbCheck=function(){
    const S=sbGet(sbIdx), words=sbWords(sbIdx);
    S.wrongSet=new Set();
    words.forEach((w,k)=>{
      if(S.found.has(k)||S.given.has(k)) return;
      const typed=(S.typed[k]||'').trim();
      if(!typed) return;
      if(sbKey(typed)===sbKey(w)) S.found.add(k); else S.wrongSet.add(k);
    });
    S.tries++;
    const before=S.lastFound||0, gained=S.found.size-before; S.lastFound=S.found.size;
    if(S.tries>=SB_MAX_TRIES){ words.forEach((_,k)=>{ if(!S.found.has(k)) S.given.add(k); }); S.wrongSet=new Set(); }
    paintStory();
    if(S.found.size===words.length) toast('That sentence is yours.');
    else if(gained>=3) toast(SB_CHEER[Math.floor(Math.random()*SB_CHEER.length)]);
    else if(S.wrongSet && S.wrongSet.size) toast(SB_NUDGE[Math.floor(Math.random()*SB_NUDGE.length)]);
  };
  window._sbRead=function(){
    const S=sbGet(sbIdx), words=sbWords(sbIdx);
    if(S.reads>=SB_MAX_READS) return;
    let secs=Math.max(4,Math.round(words.length*0.7));
    sbShowing=true; S.reads++; paintStory();
    const tick=()=>{
      const c=document.getElementById('sbCount'); if(c) c.textContent=secs;
      if(secs<=0){ clearInterval(sbTimer); sbTimer=null; sbShowing=false; paintStory(); return; }
      secs--;
    };
    tick(); sbTimer=setInterval(tick,1000);
  };
  window._sbConfirm=function(){
    sbDone.add(sbIdx); solved.add(si+':story');
    const left=sbSents.length-sbDone.size;
    if(left>0) toast(left===1?'One sentence to go.':'Sentence '+sbDone.size+' of '+sbSents.length+' done.');
    const next=sbSents.findIndex((_,i)=>!sbDone.has(i));
    if(next>-1) sbOpen(next);
    paintStory();
  };
  window._sbGo=function(i){ sbOpen(i); paintStory(); };
  window._sbAgain=function(){ sbDone.delete(sbIdx); sbS[sbIdx]=null; sbOpen(sbIdx); paintStory(); };
  window._sbFinish=function(){
    let given=0, total=0;
    sbSents.forEach((_,i)=>{ const S=sbGet(i); total+=sbWords(i).length; given+=S.given.size; });
    const pct=total?Math.round(((total-given)/total)*100):0;
    if(pct===100) sbPrize();
    else showWhole(sbSents,'✓ THE PARAGRAPH IS COMPLETE  ·  '+pct+'% FROM MEMORY');
  };
  function sbPrize(){
    document.getElementById('cardBody').innerHTML=
      '<div class="prize"><div class="prize-badge">100%</div>'+
      '<div class="prize-title">PERFECT RECALL</div>'+
      '<div class="prize-sub">Every word from memory — nothing shown to you.</div>'+
      '<div class="os-whole" style="margin-top:.7rem">'+sbSents.map(lightFrames).join(' ')+'</div></div>';
    document.getElementById('cardActions').innerHTML=
      '<button onclick="window._reload()">AGAIN</button>'+
      '<button class="primary" onclick="window._next()">NEXT STAGE →</button>';
    burst();
  }

  /* ═══ PUZZLE — sort → CONFIRM → the sentence is saved into the paragraph ═══
     The paragraph starts incomplete (blank slots) and is complete when the
     exercise is over. Tap any saved sentence to edit it again.            ═══ */
  let pzStage=-1, pzSents=[], pzIdx=0, pzDone=new Set(), pzPlaced=[], pzPool=[];
  function renderPuzzle(st){
    if(pzStage!==si){ pzStage=si; pzSents=st.sents.slice(); pzIdx=0; pzDone=new Set(); openSentence(0); }
    paintPuzzle();
  }
  const PZ_BREAK=/(?<=,)\s+|\s+(?=(?:and|but|so|because|which|that|when|if|although|while|as|in|on|at|through|among|during|with|for|by|from|before|after|since)\b)/i;
  function unitsOf(sent){
    const words=(sent||'').split(/\s+/).filter(Boolean);
    if(words.length<=14) return words;                 // short enough for word tiles
    let parts=(sent||'').split(PZ_BREAK).filter(Boolean);
    const merged=[];                                    // no one-word slivers
    parts.forEach(p=>{
      if(merged.length && p.split(/\s+/).length===1 && !/,$/.test(merged[merged.length-1]))
        merged[merged.length-1]+=' '+p;
      else merged.push(p);
    });
    return merged.length>=3 ? merged : words;
  }
  function openSentence(i){
    pzIdx=i;
    const u=unitsOf(pzSents[i]);
    if(pzDone.has(i)){ pzPlaced=u.slice(); pzPool=[]; }
    else{ pzPlaced=[]; pzPool=shuffle(u.slice()); }
  }
  function paintPuzzle(){
    const body=document.getElementById('cardBody'), actions=document.getElementById('cardActions');
    const words=unitsOf(pzSents[pzIdx]);
    const saved=pzDone.has(pzIdx), complete=pzDone.size===pzSents.length;
    const ready=!saved && pzPlaced.length===words.length;

    // ONE box. Confirmed sentences stay; the current one forms in its own position.
    const box=pzSents.map((s,i)=>{
      if(pzDone.has(i))
        return '<span class="ps-done" data-edit="'+i+'" title="Tap to edit">'+lightFrames(s)+'</span>';
      if(i===pzIdx){
        const placed=pzPlaced.map((w,k)=>'<span class="ps-place" data-i="'+k+'" title="Tap to take it back">'+w+'</span>').join(' ');
        const left=words.length-pzPlaced.length;
        return placed + (left>0 ? (placed?' ':'')+'<span class="ps-gap">'+'▁▁▁ '.repeat(Math.min(left,6)).trim()+'</span>' : '');
      }
      return '<span class="ps-todo">…</span>';
    }).filter(Boolean).join(' ');

    body.innerHTML =
      '<div class="pz-built">'+box+'</div>' +
      '<div class="hint">'+(complete
        ? 'The paragraph is complete. Tap any sentence to edit it.'
        : saved
          ? 'Sentence '+(pzIdx+1)+' is saved. Tap a dot for the next one.'
          : 'Sentence '+(pzIdx+1)+' of '+pzSents.length+' — tap the words in order, then confirm.')+'</div>' +
      (saved ? '' : '<div class="pz-pool" id="pzPool"></div>') +
      '<div class="pz-dots" id="pzDots"></div>';

    // tap a saved sentence → edit it
    [].slice.call(body.querySelectorAll('.ps-done')).forEach(el=>{
      el.onclick=()=>{ const i=+el.getAttribute('data-edit'); pzDone.delete(i); openSentence(i); paintPuzzle(); };
    });
    // tap a placed word → send it back to the pool
    [].slice.call(body.querySelectorAll('.ps-place')).forEach(el=>{
      el.onclick=()=>{ const i=+el.getAttribute('data-i'); pzPool.push(pzPlaced[i]); pzPlaced.splice(i,1); paintPuzzle(); };
    });

    const pool=document.getElementById('pzPool');
    if(pool){
      pool.innerHTML=pzPool.map((w,i)=>'<span class="pz-w" data-p="'+i+'">'+w+'</span>').join('');
      [].slice.call(pool.querySelectorAll('.pz-w')).forEach(el=>{
        el.onclick=()=>{ const i=+el.getAttribute('data-p'); pzPlaced.push(pzPool[i]); pzPool.splice(i,1); paintPuzzle(); };
      });
    }

    const dots=document.getElementById('pzDots');
    pzSents.forEach((_,i)=>{
      const d=document.createElement('button');
      d.className='pz-dot'+(i===pzIdx?' on':'')+(pzDone.has(i)?' done':'');
      d.textContent=String(i+1);
      d.onclick=()=>{ openSentence(i); paintPuzzle(); };
      dots.appendChild(d);
    });

    const nextUndone=pzSents.findIndex((_,i)=>!pzDone.has(i) && i!==pzIdx);
    actions.innerHTML =
      (saved ? '<button onclick="window._pzEdit()">EDIT THIS SENTENCE</button>'
             : '<button onclick="window._pzReset()">RESET</button>') +
      (saved && nextUndone>-1 ? '<button class="primary" onclick="window._pzGo('+nextUndone+')">NEXT SENTENCE →</button>' : '') +
      (!saved ? '<button class="primary" id="pzConfirm" '+(ready?'':'disabled')+' onclick="window._pzConfirm()">CONFIRM SENTENCE</button>' : '') +
      (complete ? '<button class="primary" onclick="window._pzFinish()">SEE IT WHOLE →</button>' : '');
  }

  window._pzConfirm=function(){
    const words=unitsOf(pzSents[pzIdx]);
    if(pzPlaced.join(' ')===words.join(' ')){
      pzDone.add(pzIdx); solved.add(si+':puzzle');
      const next=pzSents.findIndex((_,i)=>!pzDone.has(i));
      if(next>-1) openSentence(next);
      paintPuzzle();
    } else {
      const l=document.getElementById('pzLine');
      if(l&&!l.querySelector('.pz-nudge'))
        l.insertAdjacentHTML('beforeend','<div class="pz-nudge">All the words are there — try another arrangement.</div>');
    }
  };
  window._pzGo=function(i){ openSentence(i); paintPuzzle(); };
  window._pzEdit=function(){ pzDone.delete(pzIdx); openSentence(pzIdx); paintPuzzle(); };
  window._pzReset=function(){ openSentence(pzIdx); paintPuzzle(); };
  window._pzFinish=function(){ showWhole(pzSents,'✓ THE PARAGRAPH IS COMPLETE'); };

  /* ═══ BUILDER — build the paragraph's joints ═══
     Every discourse marker is blanked. Choose the connector that fits.
     A right choice locks in AND names what it does. A wrong choice explains
     itself: "'Furthermore' adds another idea — but here the sentence gives
     a reason." You learn the function, not just the word.              ═══ */
  const BD_FUNC=[
    {f:'sets the scene',   tag:'SCENE',    list:['Nowadays','These days','In recent times','In recent years','It is common knowledge that','It is widely recognised that','It is often argued that','It is generally assumed that']},
    {f:'starts the first point', tag:'FIRST', list:['Firstly','First of all','To begin with','In the first place','For one thing']},
    {f:'adds another idea',tag:'ADD',      list:['Furthermore','Moreover','In addition','What is more','Besides','Secondly','Apart from that']},
    {f:'turns to the other side', tag:'CONTRAST', list:['However','On the other hand','Nevertheless','In contrast','Nonetheless','Even so']},
    {f:'gives a reason',   tag:'REASON',   list:['This is because','The main reason is that','Because of this','Since']},
    {f:'gives an example', tag:'EXAMPLE',  list:['For example','For instance','To illustrate','A good example is']},
    {f:'shows a result',   tag:'RESULT',   list:['As a result','Therefore','Consequently','Thus','This means that','Hence']},
    {f:'closes the text',  tag:'CLOSE',    list:['In conclusion','To sum up','Overall','All in all','All things considered','To conclude','On the whole','Weighing it all up']},
    {f:'states an opinion',tag:'OPINION',  list:['In my view','I firmly believe that','From my point of view','Personally','I am convinced that','It seems to me that']}
  ];
  function bdMatch(sent){
    let best=null;
    BD_FUNC.forEach(g=>g.list.forEach(fr=>{
      const re=new RegExp('^'+fr.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b[,]?','i');
      const m=sent.match(re);
      if(m && (!best || m[0].length>best.hit.length)) best={hit:m[0], frame:fr, func:g.f, tag:g.tag};
    }));
    return best;
  }
  let bdStage=-1, bdSlots=[], bdSolved={}, bdActive=0, bdNote='';
  function renderBuilder(st){
    if(bdStage!==si){
      bdStage=si; bdSolved={}; bdActive=0; bdNote='';
      bdSlots=[];
      st.sents.forEach((s,i)=>{ const m=bdMatch(s); if(m) bdSlots.push({i:i, ...m}); });
    }
    paintBuilder(st);
  }
  function paintBuilder(st){
    const body=document.getElementById('cardBody'), actions=document.getElementById('cardActions');
    if(!bdSlots.length){
      body.innerHTML='<div class="stub">No linking words to build in this section.<br><br>Try another stage, or a different game.</div>';
      actions.innerHTML=''; return;
    }
    const done=Object.keys(bdSolved).length===bdSlots.length;

    const box=st.sents.map((s,i)=>{
      const idx=bdSlots.findIndex(x=>x.i===i);
      if(idx===-1) return '<span class="bd-plain">'+s+'</span>';
      const slot=bdSlots[idx], rest=s.slice(slot.hit.length);
      if(bdSolved[idx])
        return '<span class="ps-place">'+slot.hit+'</span><span class="bd-tag">'+slot.tag+'</span>'+rest;
      if(idx===bdActive)
        return '<span class="bd-slot active">▁▁▁▁</span>'+rest;
      return '<span class="bd-slot">▁▁▁▁</span>'+rest;
    }).join(' ');

    let opts='';
    if(!done){
      const slot=bdSlots[bdActive];
      const others=BD_FUNC.filter(g=>g.tag!==slot.tag);
      const picks=shuffle(others).slice(0,3).map(g=>({t:shuffle(g.list)[0], func:g.f, right:false}));
      if(!slot._opts) slot._opts=shuffle(picks.concat([{t:slot.frame, func:slot.func, right:true}]));
      opts='<div class="bd-opts" id="bdOpts">'+slot._opts.map((o,k)=>
        '<button class="bd-opt" data-k="'+k+'">'+o.t+'</button>').join('')+
        (bdNote?'<div class="bd-note">'+bdNote+'</div>':'')+'</div>';
    }

    body.innerHTML='<div class="pz-built bd-para">'+box+'</div>'+
      '<div class="hint">'+(done
        ? 'Every joint is built. Look at what each word does.'
        : 'Which linking word fits the highlighted gap?')+'</div>'+opts;

    const box2=document.getElementById('bdOpts');
    if(box2) [].slice.call(box2.querySelectorAll('.bd-opt')).forEach(b=>{
      b.onclick=()=>{
        const slot=bdSlots[bdActive], o=slot._opts[+b.getAttribute('data-k')];
        if(o.right){
          bdSolved[bdActive]=true; bdNote='';
          const next=bdSlots.findIndex((_,k)=>!bdSolved[k]);
          bdActive=next>-1?next:bdActive;
          paintBuilder(st);
          toast('That one '+slot.func+'.');
          if(Object.keys(bdSolved).length===bdSlots.length) setTimeout(()=>bdWin(st),400);
        } else {
          b.classList.add('other');
          bdNote='“'+o.t+'” '+o.func+' — but here the sentence '+slot.func+'.';
          paintBuilder(st);
        }
      };
    });

    actions.innerHTML = done
      ? '<button onclick="window._bdReset()">AGAIN</button><button class="primary" onclick="window._next()">NEXT STAGE →</button>'
      : '<button onclick="window._bdReset()">RESET</button>';
  }
  function bdWin(st){
    const perfect=!bdNote;
    document.getElementById('cardBody').innerHTML=
      (perfect?'<div class="prize"><div class="prize-badge">100%</div><div class="prize-title">EVERY JOINT RIGHT</div></div>':'')+
      '<div class="os-win">✓ THE PARAGRAPH IS BUILT</div>'+
      '<div class="os-whole">'+st.sents.map(lightFrames).join(' ')+'</div>';
    document.getElementById('cardActions').innerHTML=
      '<button onclick="window._bdReset()">AGAIN</button><button class="primary" onclick="window._next()">NEXT STAGE →</button>';
    if(perfect) burst();
  }
  window._bdReset=function(){ bdStage=-1; load(si); };

  /* ── shared helpers for the ported games ── */
  function readOrder(boxId, source){
    return [].slice.call(document.querySelectorAll('#'+boxId+' .os-item')).map(el=>source.indexOf(el.textContent));
  }
  function gentle(els,ord,btnId,label){
    els.forEach((el,k)=>el.classList.toggle('locked',ord[k]===k));
    const n=ord.filter((v,k)=>v===k).length, btn=document.getElementById(btnId);
    if(btn){ btn.textContent = n>0 ? n+' IN PLACE — KEEP GOING' : 'TRY AGAIN';
      setTimeout(()=>{ if(btn) btn.textContent=label; },1500); }
  }
  function showWhole(sents,msg){
    document.getElementById('cardBody').innerHTML=
      '<div class="os-win">'+msg+'</div><div class="os-whole">'+sents.map(lightFrames).join(' ')+'</div>';
    document.getElementById('cardActions').innerHTML=
      '<button onclick="window._reload()">AGAIN</button><button class="primary" onclick="window._next()">NEXT STAGE →</button>';
    renderStrip();
  }
  let toastT=null;
  function toast(msg){
    let el=document.getElementById('toast');
    if(!el){ el=document.createElement('div'); el.id='toast'; document.body.appendChild(el); }
    el.textContent=msg; el.classList.add('on');
    clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),1900);
  }
  function burst(){
    const host=document.querySelector('.card'); if(!host) return;
    for(let i=0;i<18;i++){
      const b=document.createElement('i'); b.className='spark';
      b.style.left=(15+Math.random()*70)+'%';
      b.style.animationDelay=(Math.random()*0.35)+'s';
      b.style.setProperty('--dx',(Math.random()*80-40)+'px');
      host.appendChild(b); setTimeout(()=>b.remove(),1600);
    }
  }
  window._reload=function(){ load(si); };
  window._mode=function(on){
    if(on===fullText) return;
    fullText=on; solved=new Set(); pzStage=-1; si=0;
    document.getElementById('mbStages').classList.toggle('on',!on);
    document.getElementById('mbFull').classList.toggle('on',on);
    rebuildPlay(); renderStrip(); load(firstPlayable());
  };
  function wireDrag(el,boxId,after){
    el.addEventListener('dragstart',()=>{ dragEl=el; el.classList.add('dragging'); });
    el.addEventListener('dragend',()=>{ el.classList.remove('dragging'); if(after) after(); });
    el.addEventListener('dragover',e=>{ e.preventDefault();
      const box=document.getElementById(boxId); const a=afterEl(box,e.clientY);
      if(dragEl&&dragEl!==el){ a==null ? box.appendChild(dragEl) : box.insertBefore(dragEl,a); } });
    el.addEventListener('click',()=>{
      if(el.classList.contains('locked')) return;
      if(!pick){ pick=el; el.classList.add('picked'); }
      else{
        if(pick!==el){ const box=document.getElementById(boxId);
          const pi=[].slice.call(box.children).indexOf(pick), ei=[].slice.call(box.children).indexOf(el);
          pi<ei ? box.insertBefore(el,pick) : box.insertBefore(pick,el); }
        pick.classList.remove('picked'); pick=null; if(after) after();
      }});
  }

  function renderStub(gm){
    document.getElementById('cardBody').innerHTML=
      `<div class="stub"><b>${gm.nm}</b> for this stage<br>is coming soon.<br><br>Try <b>Order Supports</b> \u2014 it's live.</div>`;
    document.getElementById('cardActions').innerHTML='';
  }


})();
</script>
</body>
